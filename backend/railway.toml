[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "DJANGO_SETTINGS_MODULE=config.settings.prod python manage.py migrate --noinput && DJANGO_SETTINGS_MODULE=config.settings.prod gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
healthcheckPath = "/api/health/"
restartPolicyType = "on_failure"
