[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Railway execs startCommand without a shell — wrap so env assignment, &&, and $PORT work.
startCommand = "sh -c 'export DJANGO_SETTINGS_MODULE=config.settings.prod && python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120'"
healthcheckPath = "/api/health/"
restartPolicyType = "on_failure"
